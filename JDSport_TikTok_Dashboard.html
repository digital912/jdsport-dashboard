<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JD Sport — TikTok Ads Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #0A0D14;
  --bg2: #111520;
  --bg3: #161B28;
  --card: #1A2035;
  --card2: #1F2740;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #F0F4FF;
  --text2: #8892AA;
  --text3: #555E78;
  --accent: #00E5C3;
  --accent2: #0085FF;
  --gold: #FFB547;
  --red: #FF5C5C;
  --green: #00E5C3;
  --purple: #9B6DFF;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px 24px}

/* SIDEBAR */
.logo-area{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#00E5C3,#0085FF);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.logo-icon svg{width:18px;height:18px;fill:#fff}
.logo-name{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}

.nav-section{padding:16px 16px 6px;font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;border-radius:8px;margin:1px 8px;cursor:pointer;color:var(--text2);font-size:12.5px;transition:all .15s}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:rgba(0,229,195,0.1);color:var(--accent);border:1px solid rgba(0,229,195,0.2)}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}

.account-section{padding:12px 16px;margin-top:auto;border-top:1px solid var(--border)}
.acc-label{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.acc-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:background .15s}
.acc-item:hover{background:var(--card)}
.acc-item.active-acc{background:var(--card);border:1px solid var(--border2)}
.acc-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.acc-info-name{font-size:12px;font-weight:500;color:var(--text)}
.acc-info-sub{font-size:10px;color:var(--text3)}
.acc-dot{width:6px;height:6px;border-radius:50%;margin-left:auto;flex-shrink:0}

/* TOPBAR */
.tb-left{display:flex;flex-direction:column}
.tb-title{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.tb-sub{font-size:11px;color:var(--text2);margin-top:2px;font-family:var(--mono)}
.tb-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.qbtn{font-size:11px;padding:5px 11px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font)}
.qbtn:hover{background:var(--card);color:var(--text)}
.qbtn.active{background:rgba(0,133,255,0.15);color:var(--accent2);border-color:rgba(0,133,255,0.4);font-weight:500}
.custom-wrap{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--card)}
.custom-wrap.active-c{border-color:rgba(0,229,195,.4);background:rgba(0,229,195,.06)}
.custom-wrap label{font-size:10px;color:var(--text3);white-space:nowrap}
.custom-wrap.active-c label{color:var(--accent)}
.custom-wrap input[type=date]{font-size:11px;border:none;background:transparent;color:var(--text);outline:none;width:108px;cursor:pointer;font-family:var(--font)}
.custom-wrap input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.4;cursor:pointer}
.csep{font-size:12px;color:var(--text3)}
.apply-btn{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid rgba(0,229,195,.4);background:rgba(0,229,195,.1);color:var(--accent);cursor:pointer;font-weight:500;font-family:var(--font);transition:all .15s}
.apply-btn:hover{background:rgba(0,229,195,.18)}
.export-btn{font-size:11px;padding:6px 14px;border-radius:6px;border:1px solid rgba(0,229,195,.4);background:rgba(0,229,195,.1);color:var(--accent);cursor:pointer;font-weight:600;font-family:var(--font);transition:all .15s;display:flex;align-items:center;gap:5px}
.export-btn:hover{background:rgba(0,229,195,.2)}

/* PERIOD LABEL */
.period-label{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;background:var(--card);border:1px solid var(--border2);border-radius:20px;font-size:11px;color:var(--text2);font-family:var(--mono);margin-bottom:16px}
.period-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent)}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;border-top:2px solid;transition:border-color .2s}
.kpi:hover{border-color:var(--border2)}
.kpi-label{font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.kpi-value{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-.5px;margin-bottom:4px}
.kpi-sub{font-size:11px;color:var(--text2);font-family:var(--mono)}
.kpi-delta{font-size:11px;margin-top:2px}
.delta-up{color:var(--green)}.delta-down{color:var(--red)}

/* YEAR CARDS */
.yr-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.yr-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;transition:all .15s;border-top:2px solid}
.yr-card:hover{border-color:var(--border2);background:var(--card2)}
.yr-card.active-yr{border-color:var(--accent2)!important;background:rgba(0,133,255,.08)}
.yr-year{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.05em;margin-bottom:4px}
.yr-spend{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.yr-meta{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}

/* GRID LAYOUTS */
.row2{display:grid;grid-template-columns:1.7fr 1fr;gap:12px;margin-bottom:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.card-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;text-transform:uppercase;letter-spacing:.06em}
.card-sub{font-size:10px;color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0}

/* CHART BARS */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:11px;color:var(--text);width:88px;flex-shrink:0}
.bar-bg{flex:1;height:20px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.bar-fill{height:20px;border-radius:4px;display:flex;align-items:center;padding:0 8px;transition:width .5s ease}
.bar-fill span{font-size:10px;color:#000;font-weight:600;white-space:nowrap}
.bar-pct{font-size:11px;font-weight:500;color:var(--text);width:38px;text-align:right;flex-shrink:0;font-family:var(--mono)}
.bar-meta{font-size:10px;color:var(--text3);width:72px;text-align:right;flex-shrink:0;font-family:var(--mono)}

/* FUNNEL */
.funnel-row{display:flex;flex-direction:column;gap:5px}
.fi{display:flex;align-items:center;gap:8px}
.fi-lbl{font-size:11px;color:var(--text2);width:78px;flex-shrink:0}
.fi-bg{flex:1;height:14px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.fi-fill{height:14px;border-radius:3px;display:flex;align-items:center;padding-left:6px;min-width:20px}
.fi-fill span{font-size:9px;font-weight:600;color:#000;white-space:nowrap}
.fi-pct{font-size:11px;color:var(--text3);width:34px;text-align:right;flex-shrink:0;font-family:var(--mono)}

/* TREND BARS */
.trend-bars{display:flex;align-items:flex-end;gap:2px;height:60px}
.tb{border-radius:2px 2px 0 0;min-width:7px;flex:1;cursor:default;transition:opacity .15s;position:relative}
.tb:hover{opacity:.8}
.tb-tooltip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:10px;color:var(--text);white-space:nowrap;pointer-events:none;display:none;z-index:10;font-family:var(--mono)}
.tb:hover .tb-tooltip{display:block}

/* MINI ROWS */
.mini-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.mini-row:last-child{margin-bottom:0}
.ym-chip{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600;flex-shrink:0;font-family:var(--mono)}
.mini-name{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
.mbar-bg{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px}
.mbar{height:5px;border-radius:3px}
.mval{font-size:10px;color:var(--text3);min-width:36px;text-align:right;font-family:var(--mono)}

/* ENGAGEMENT GRID */
.eng-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ec{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.ec-v{font-size:18px;font-weight:600;letter-spacing:-.5px}
.ec-l{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}

/* YEAR TABLE */
table.yr-tbl{width:100%;border-collapse:collapse;font-size:11px}
table.yr-tbl th{padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text3);font-weight:500;text-align:right;font-family:var(--mono);font-size:10px}
table.yr-tbl th:first-child{text-align:left}
table.yr-tbl td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text2);text-align:right;font-family:var(--mono)}
table.yr-tbl td:first-child{text-align:left;font-weight:600}

/* TABS */
.tab-nav{display:flex;gap:2px;background:var(--bg2);border-radius:8px;padding:3px;margin-bottom:14px;width:fit-content}
.tab-btn{font-size:11.5px;padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font);transition:all .15s;font-weight:500}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{background:var(--card2);color:var(--text);border:1px solid var(--border2)}
.tab-panel{display:none}.tab-panel.active{display:block}

/* METRIC BTNS */
.metric-btns{display:flex;gap:4px}
.mb{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--mono);transition:all .15s}
.mb:hover{color:var(--text)}
.mb.active{background:rgba(0,229,195,.12);color:var(--accent);border-color:rgba(0,229,195,.3)}

/* INSIGHT BOXES */
.insight{background:rgba(0,229,195,.07);border:1px solid rgba(0,229,195,.2);border-radius:8px;padding:10px 14px;margin-top:10px}
.insight p{font-size:11px;color:rgba(0,229,195,.9);line-height:1.6}
.warn{background:rgba(255,181,71,.07);border:1px solid rgba(255,181,71,.2);border-radius:8px;padding:10px 14px;margin-top:8px}
.warn p{font-size:11px;color:rgba(255,181,71,.9);line-height:1.6}

/* LOCATION BARS */
.loc-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.loc-rank{font-size:10px;color:var(--text3);width:16px;text-align:center;flex-shrink:0;font-family:var(--mono)}
.loc-name{font-size:11px;color:var(--text);width:105px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.loc-bar-bg{flex:1;height:10px;background:rgba(255,255,255,.06);border-radius:3px}
.loc-bar{height:10px;border-radius:3px}
.loc-val{font-size:10px;color:var(--text3);width:55px;text-align:right;flex-shrink:0;font-family:var(--mono)}

/* CAMPAIGN STATUS */
.camp-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.camp-row:last-child{border-bottom:none}
.camp-name{font-size:12px;font-weight:500;color:var(--text)}
.camp-meta{font-size:10px;color:var(--text3);margin-top:1px;font-family:var(--mono)}
.sbadge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;display:inline-block}
.s-active{background:rgba(0,229,195,.15);color:var(--accent)}
.s-pause{background:rgba(255,255,255,.08);color:var(--text3)}
.s-expired{background:rgba(255,92,92,.15);color:var(--red)}

/* NO DATA */
.no-data{text-align:center;padding:30px;color:var(--text3);font-size:12px}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}
  .kpi-row{grid-template-columns:1fr 1fr}
  .row2{grid-template-columns:1fr}
  .row3{grid-template-columns:1fr}
  .yr-row{grid-template-columns:1fr 1fr}
  .content{padding:14px}
  .topbar{padding:10px 14px}
}
</style>
</head>

</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">

      <div class="tb-sub" id="tb-sub">Jan 2023 – Apr 2026</div>

      </button>
    </div>
  </div>

  <div class="content" id="content">

  </div>
</div>

const YR_COLS={2023:'#00E5C3',2024:'#0085FF',2025:'#FFB547',2026:'#FF5C5C'};
const MN=['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
const sum=(arr,k)=>arr.reduce((a,r)=>a+(r[k]||0),0);
function fmtM(v){if(v>=1e9)return(v/1e9).toFixed(1)+' M';if(v>=1e6)return(v/1e6).toFixed(1)+' Jt';if(v>=1e3)return Math.round(v/1e3)+'K';return Math.round(v).toLocaleString('id');}
function fmtFull(v){return Math.round(v).toLocaleString('id');}

let curFrom='2023-01-01', curTo='2026-04-13', curTab='overview', curAgeMetric='spend';
let donutChart=null;

function ymToDate(y,m){return `${y}-${String(m).padStart(2,'0')}-01`;}
function getFiltered(){return MONTHLY.filter(r=>ymToDate(r.y,r.m)>=curFrom&&ymToDate(r.y,r.m)<=curTo);}

// ─── PERIOD CONTROLS ─────────────────────────────────────────────────────────
function setPeriod(p){
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('cw').classList.remove('active-c');
  if(p==='all'){curFrom='2023-01-01';curTo='2026-04-13';document.getElementById('btn-all').classList.add('active');}
  else{curFrom=`${p}-01-01`;curTo=p==='2026'?'2026-04-13':`${p}-12-31`;event.target.classList.add('active');}
  document.getElementById('df').value=curFrom;
  document.getElementById('dt').value=curTo;
  renderAll();
}
function applyCustom(){
  const f=document.getElementById('df').value,t=document.getElementById('dt').value;
  if(!f||!t||f>t){alert('Tanggal tidak valid');return;}
  curFrom=f;curTo=t;
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('cw').classList.add('active-c');
  renderAll();
}
document.getElementById('df').addEventListener('change',()=>document.getElementById('cw').classList.add('active-c'));
document.getElementById('dt').addEventListener('change',()=>document.getElementById('cw').classList.add('active-c'));

// ─── TABS ────────────────────────────────────────────────────────────────────
function setTab(tab){
  curTab=tab;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderAll();
}

// ─── RENDER ALL ──────────────────────────────────────────────────────────────
function renderAll(){
  const data=getFiltered();
  const fmtD=d=>{const[y,m]=d.split('-');return`${MN[parseInt(m)]} ${y}`;};
  document.getElementById('tb-sub').textContent=`${fmtD(curFrom)} – ${fmtD(curTo)}`;

  if(curTab==='overview') renderOverview(data);
  else if(curTab==='demographic') renderDemographic();
  else if(curTab==='location') renderLocation();
  else if(curTab==='campaign') renderCampaign();
}

// ─── OVERVIEW ────────────────────────────────────────────────────────────────
function renderOverview(data){
  const c=document.getElementById('content');
  if(!data.length){c.innerHTML='<div class="no-data">Tidak ada data untuk periode ini.</div>';return;}
  const tSpend=sum(data,'spend'),tImpr=sum(data,'impr'),tClicks=sum(data,'clicks'),tReach=sum(data,'reach'),
        tPlays=sum(data,'plays'),tCompl=sum(data,'compl'),tV2s=sum(data,'v2s'),tV6s=sum(data,'v6s'),
        tLikes=sum(data,'likes'),tCmts=sum(data,'cmts'),tShares=sum(data,'shares'),tFollows=sum(data,'follows'),tPv=sum(data,'pv');
  const ctr=tImpr>0?((tClicks/tImpr)*100).toFixed(2):'0';
  const fmtD=d=>{const[y,m]=d.split('-');return`${MN[parseInt(m)]} ${y}`;};

  const years=[2023,2024,2025,2026];
  const yrD={};years.forEach(y=>{yrD[y]=data.filter(r=>r.y===y);});
  const yrCards=years.filter(y=>yrD[y].length>0).map(y=>`
    <div class="yr-card" style="border-top-color:${YR_COLS[y]}" onclick="setPeriodYear(${y})">
      <div class="yr-year">${y}</div>
      <div class="yr-spend">Rp ${fmtM(sum(yrD[y],'spend'))}</div>
      <div class="yr-meta">${yrD[y].length} bln · ${fmtM(sum(yrD[y],'plays'))} plays</div>
    </div>`).join('');

  const maxS=Math.max(...data.map(r=>r.spend));
  const trendBars=data.map(r=>{
    const h=Math.max(Math.round((r.spend/maxS)*54),2);
    return `<div class="tb" style="height:${h}px;background:${YR_COLS[r.y]};opacity:.85">
      <div class="tb-tooltip">${MN[r.m]} ${r.y}<br>Rp ${fmtFull(r.spend)}</div>
    </div>`;}).join('');

  const top5=data.slice().sort((a,b)=>b.spend-a.spend).slice(0,5);
  const mxT=top5[0]?.spend||1;
  const topRows=top5.map(r=>`
    <div class="mini-row">
      <span class="ym-chip" style="background:${YR_COLS[r.y]}22;color:${YR_COLS[r.y]}">${MN[r.m]} ${r.y}</span>
      <div class="mbar-bg"><div class="mbar" style="width:${Math.round(r.spend/mxT*100)}%;background:${YR_COLS[r.y]}"></div></div>
      <span class="mval">Rp ${fmtM(r.spend)}</span>
    </div>`).join('');

  const yrTableRows=years.filter(y=>yrD[y].length).map(y=>`
    <tr>
      <td style="color:${YR_COLS[y]}">${y}</td>
      <td>Rp ${fmtM(sum(yrD[y],'spend'))}</td>
      <td>${fmtM(sum(yrD[y],'plays'))}</td>
      <td>${fmtM(sum(yrD[y],'clicks'))}</td>
      <td>${fmtM(sum(yrD[y],'likes'))}</td>
    </tr>`).join('');

  c.innerHTML=`
    <div class="period-label"><span class="period-dot"></span>${fmtD(curFrom)} – ${fmtD(curTo)} · ${data.length} bulan data</div>
    <div class="yr-row">${yrCards}</div>
    <div class="kpi-row">
      <div class="kpi" style="border-top-color:#00E5C3"><div class="kpi-label">Total Spend</div><div class="kpi-value">Rp ${fmtM(tSpend)}</div><div class="kpi-sub">CPM Rp ${fmtFull(tImpr>0?Math.round(tSpend/tImpr*1000):0)}</div></div>
      <div class="kpi" style="border-top-color:#0085FF"><div class="kpi-label">Video Plays</div><div class="kpi-value">${fmtM(tPlays)}</div><div class="kpi-sub">Impresi ${fmtM(tImpr)}</div></div>
      <div class="kpi" style="border-top-color:#FFB547"><div class="kpi-label">Total Clicks</div><div class="kpi-value">${fmtM(tClicks)}</div><div class="kpi-sub">CTR ${ctr}%</div></div>
      <div class="kpi" style="border-top-color:#9B6DFF"><div class="kpi-label">Reach</div><div class="kpi-value">${fmtM(tReach)}</div><div class="kpi-sub">Completions ${fmtM(tCompl)}</div></div>
    </div>
    <div class="row2">
      <div class="card">
        <div class="card-title">Spend bulanan <span class="card-sub">${data.length} bulan</span></div>
        <div class="trend-bars">${trendBars}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
          <div style="text-align:center"><div style="font-size:13px;font-weight:600;color:var(--text)">${fmtM(tV2s)}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px">2s views</div></div>
          <div style="text-align:center;border-left:1px solid var(--border);border-right:1px solid var(--border)"><div style="font-size:13px;font-weight:600;color:var(--text)">${fmtM(tV6s)}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px">6s views</div></div>
          <div style="text-align:center"><div style="font-size:13px;font-weight:600;color:var(--accent)">${fmtM(tCompl)}</div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px">Completions</div></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Video funnel</div>
        <div class="funnel-row">
          ${[{l:'Plays',v:tPlays,p:100,c:'#185FA5'},{l:'2s views',v:tV2s,p:tPlays?+(tV2s/tPlays*100).toFixed(1):0,c:'#0085FF'},{l:'6s views',v:tV6s,p:tPlays?+(tV6s/tPlays*100).toFixed(1):0,c:'#0D9488'},{l:'Complete',v:tCompl,p:tPlays?+(tCompl/tPlays*100).toFixed(1):0,c:'#00E5C3'},{l:'Clicks',v:tClicks,p:tImpr?+(tClicks/tImpr*100).toFixed(2):0,c:'#FFB547'}].map(f=>`
          <div class="fi">
            <div class="fi-lbl">${f.l}</div>
            <div class="fi-bg"><div class="fi-fill" style="width:${Math.max(f.p,.3)}%;background:${f.c};min-width:${f.v>0?18:0}px"><span>${fmtM(f.v)}</span></div></div>
            <div class="fi-pct">${f.p}%</div>
          </div>`).join('')}
        </div>
        <div style="margin-top:10px;background:rgba(0,229,195,.08);border:1px solid rgba(0,229,195,.2);border-radius:8px;padding:8px 12px">
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Avg play duration</div>
          <div style="font-size:16px;font-weight:600;color:var(--accent);margin-top:2px">6.05 detik / user</div>
        </div>
      </div>
    </div>
    <div class="row3">
      <div class="card">
        <div class="card-title">Top bulan by spend</div>
        ${topRows}
      </div>
      <div class="card">
        <div class="card-title">Social engagement</div>
        <div class="eng-grid">
          <div class="ec"><div class="ec-v" style="color:#FF5C5C">${fmtM(tLikes)}</div><div class="ec-l">Likes</div></div>

          <div class="ec"><div class="ec-v" style="color:#0085FF">${fmtM(tPv)}</div><div class="ec-l">Profile Visits</div></div>
          <div class="ec"><div class="ec-v" style="color:var(--text3)">${fmtM(tShares)}</div><div class="ec-l">Shares</div></div>
        </div>
        <div style="margin-top:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:8px 12px">

          <div style="font-size:15px;font-weight:600;color:var(--text);margin-top:2px">${fmtFull(tCmts)}</div>

          <tbody>${yrTableRows}</tbody>
        </table>
      </div>
    </div>`;

      <div class="metric-btns" id="age-metric-btns">
        <button class="mb active" onclick="setAgeMetric('spend',this)">Spend</button>
        <button class="mb" onclick="setAgeMetric('clicks',this)">Clicks</button>
        <button class="mb" onclick="setAgeMetric('likes',this)">Likes</button>
        <button class="mb" onclick="setAgeMetric('follows',this)">Follows</button>
      </div>
    </div>
    <div class="tab-panel active" id="demo-age">
      <div class="row2">
        <div class="card">
          <div class="card-title">Distribusi per kelompok usia <span class="card-sub" id="age-metric-lbl">· spend</span></div>
          <div id="age-bars"></div>
          <div class="insight" id="age-insight"></div>
        </div>
        <div class="card">
          <div class="card-title">Efisiensi usia</div>
          <div id="age-eff-table"></div>
          <div class="warn" style="margin-top:10px"><p><strong>⚠ Gap spend vs engagement:</strong> Usia 25–34 spend terbesar tapi usia 18–24 lebih efisien untuk follows. Pertimbangkan split campaign per objective.</p></div>
        </div>
      </div>
    </div>
    <div class="tab-panel" id="demo-gender">
      <div class="row2">
        <div class="card">
          <div class="card-title">Distribusi gender</div>
          <div style="display:flex;align-items:center;gap:20px;margin-bottom:12px">
            <canvas id="gender-donut" width="130" height="130"></canvas>
            <div id="gender-legend" style="flex:1"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Perbandingan semua metrik</div>
          <div id="gender-compare"></div>
          <div class="insight" style="margin-top:10px"><p><strong>★ Insight:</strong> Male 57% spend, tapi Female lebih cost-efficient. Untuk conversion campaign, Female audience lebih hemat per engagement.</p></div>
        </div>
      </div>
    </div>`;

  renderAgeBars();
  renderGenderChart();
}

function switchDemoTab(tab, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('demo-age').classList.toggle('active', tab==='age');
  document.getElementById('demo-gender').classList.toggle('active', tab==='gender');
  document.getElementById('age-metric-btns').style.display = tab==='age' ? 'flex' : 'none';
  if(tab==='gender') renderGenderChart();
}

function setAgeMetric(m, btn){
  curAgeMetric=m;
  document.querySelectorAll('.mb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAgeBars();
}

function renderAgeBars(){
  const AGE_COLORS_MAP={'13–17':'#B5D4F4','18–24':'#0085FF','25–34':'#00E5C3','35–44':'#FFB547','45–54':'#9B6DFF','55+':'#555E78'};
  const metricLabels={spend:'spend',clicks:'clicks',likes:'likes',follows:'follows'};
  const k=curAgeMetric;
  const maxV=Math.max(...AGE_DATA.map(d=>d[k]));
  const totalV=AGE_DATA.reduce((a,d)=>a+d[k],0);
  const lbl=document.getElementById('age-metric-lbl');
  if(lbl) lbl.textContent=`· ${metricLabels[k]}`;
  const barsEl=document.getElementById('age-bars');
  if(barsEl) barsEl.innerHTML=AGE_DATA.map(d=>{
    const pct=(d[k]/totalV*100).toFixed(1);
    const w=Math.round(d[k]/maxV*100);
    return`<div class="bar-row">
      <div class="bar-label">${d.seg}</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${w}%;background:${AGE_COLORS_MAP[d.seg]}"><span>${fmtM(d[k])}</span></div></div>
      <div class="bar-pct">${pct}%</div>
      <div class="bar-meta">${fmtM(d.reach)} reach</div>
    </div>`;}).join('');
  const topSeg=AGE_DATA.reduce((a,b)=>b[k]>a[k]?b:a);
  const insEl=document.getElementById('age-insight');
  if(insEl) insEl.innerHTML=`<p><strong>★ Segmen terbesar:</strong> Usia <strong>${topSeg.seg}</strong> — ${fmtM(topSeg[k])} (${(topSeg[k]/totalV*100).toFixed(1)}% dari total ${metricLabels[k]}). 25–34 dominan di semua metrik.</p>`;
  const tblEl=document.getElementById('age-eff-table');
  if(tblEl) tblEl.innerHTML=`<table style="width:100%;border-collapse:collapse;font-size:11px">
    <thead><tr>${['Usia','Spend','Clicks','CPF (Rp)'].map(h=>`<th style="padding:4px 6px;border-bottom:1px solid var(--border);color:var(--text3);font-size:10px;text-align:right;${h==='Usia'?'text-align:left':''}">${h}</th>`).join('')}</tr></thead>
    <tbody>${AGE_DATA.map(d=>`<tr>
      <td style="padding:5px 6px;border-bottom:1px solid rgba(255,255,255,.04);color:${AGE_COLORS_MAP[d.seg]};font-weight:600">${d.seg}</td>
      <td style="padding:5px 6px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;font-family:var(--mono);color:var(--text2)">Rp ${fmtM(d.spend)}</td>
      <td style="padding:5px 6px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;font-family:var(--mono);color:var(--text2)">${fmtM(d.clicks)}</td>
      <td style="padding:5px 6px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;font-family:var(--mono);color:var(--text2)">${d.follows>0?'Rp '+fmtM(Math.round(d.spend/d.follows)):'-'}</td>
    </tr>`).join('')}</tbody></table>`;
}

function renderGenderChart(){
  const gEl=document.getElementById('gender-donut');
  if(!gEl) return;
  if(donutChart){donutChart.destroy();donutChart=null;}
  const GCOLS={'Male':'#0085FF','Female':'#FF5C5C','Unknown':'#555E78'};
  const total=GENDER_DATA.reduce((a,d)=>a+d.spend,0);
  donutChart=new Chart(gEl,{type:'doughnut',data:{labels:GENDER_DATA.map(d=>d.seg),datasets:[{data:GENDER_DATA.map(d=>d.spend),backgroundColor:GENDER_DATA.map(d=>GCOLS[d.seg]),borderWidth:0,hoverOffset:4}]},options:{responsive:false,cutout:'68%',plugins:{legend:{display:false}}}});
  const legEl=document.getElementById('gender-legend');
  if(legEl) legEl.innerHTML=GENDER_DATA.map(d=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="width:10px;height:10px;border-radius:2px;background:${GCOLS[d.seg]};flex-shrink:0"></span>
      <span style="font-size:12px;color:var(--text)">${d.seg}</span>
      <span style="margin-left:auto;font-size:12px;font-weight:600;color:var(--text);font-family:var(--mono)">${(d.spend/total*100).toFixed(1)}%</span>
      <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">${fmtM(d.spend)}</span>
    </div>`).join('');
  const metrics=['spend','clicks','likes','follows'];
  const mL={spend:'Spend',clicks:'Clicks',likes:'Likes',follows:'Follows'};
  const cmpEl=document.getElementById('gender-compare');
  if(cmpEl) cmpEl.innerHTML=metrics.map(k=>{
    const tot=GENDER_DATA.reduce((a,d)=>a+d[k],0);
    return`<div style="margin-bottom:9px">
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">${mL[k]}</div>
      ${GENDER_DATA.map(d=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <div style="font-size:10px;color:var(--text3);width:54px;flex-shrink:0">${d.seg}</div>
        <div style="flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden">
          <div style="width:${(d[k]/tot*100).toFixed(1)}%;height:8px;background:${GCOLS[d.seg]};border-radius:3px"></div>
        </div>
        <div style="font-size:10px;color:var(--text3);width:42px;text-align:right;font-family:var(--mono)">${(d[k]/tot*100).toFixed(1)}%</div>
      </div>`).join('')}
    </div>`;}).join('');
}

// ─── LOCATION ────────────────────────────────────────────────────────────────
function renderLocation(){
  const c=document.getElementById('content');
  const topSpend=LOC_DATA.slice(0,15);
  const topClicks=[...LOC_DATA].sort((a,b)=>b.clicks-a.clicks).slice(0,15);
  const maxS=topSpend[0].spend, maxCl=topClicks[0].clicks;
  const LCOLS=['#00E5C3','#0085FF','#FFB547','#FF5C5C','#9B6DFF'];

  c.innerHTML=`
    <div class="period-label"><span class="period-dot"></span>Lokasi · semua data historis · ${LOC_DATA.length} provinsi aktif</div>
    <div class="row2">
      <div class="card">
        <div class="card-title">Top 15 by spend</div>
        ${topSpend.map((r,i)=>`<div class="loc-row">
          <div class="loc-rank">${i+1}</div>
          <div class="loc-name">${r.name}</div>
          <div class="loc-bar-bg"><div class="loc-bar" style="width:${Math.round(r.spend/maxS*100)}%;background:${LCOLS[Math.min(i,4)]}"></div></div>
          <div class="loc-val">Rp ${fmtM(r.spend)}</div>
        </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title">Top 15 by clicks</div>
        ${topClicks.map((r,i)=>`<div class="loc-row">
          <div class="loc-rank">${i+1}</div>
          <div class="loc-name">${r.name}</div>
          <div class="loc-bar-bg"><div class="loc-bar" style="width:${Math.round(r.clicks/maxCl*100)}%;background:${LCOLS[Math.min(i,4)]}"></div></div>
          <div class="loc-val">${fmtM(r.clicks)} klik</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Semua lokasi aktif</div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:500px">
          <thead><tr>${['#','Provinsi','Spend (Rp)','Clicks','Reach','CTR'].map(h=>`<th style="padding:5px 8px;border-bottom:1px solid var(--border);color:var(--text3);font-weight:500;text-align:right;font-family:var(--mono);font-size:10px;${h==='#'||h==='Provinsi'?'text-align:left':''}">${h}</th>`).join('')}</tr></thead>
          <tbody>${LOC_DATA.map((r,i)=>`<tr>
            <td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text3);font-family:var(--mono)">${i+1}</td>
            <td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);font-weight:${i<3?'600':'400'};color:${i<3?'var(--text)':'var(--text2)'}">${r.name}${i===0?'<span style="background:rgba(0,229,195,.15);color:var(--accent);font-size:9px;padding:1px 6px;border-radius:3px;margin-left:6px;font-weight:500">Top</span>':''}</td>
            <td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;font-family:var(--mono);color:var(--text2)">Rp ${fmtM(r.spend)}</td>
            <td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;font-family:var(--mono);color:var(--text2)">${fmtM(r.clicks)}</td>
            <td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;font-family:var(--mono);color:var(--text2)">${fmtM(r.reach)}</td>
            <td style="padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;font-family:var(--mono);color:var(--text2)">${r.reach>0?(r.clicks/r.reach*100).toFixed(2)+'%':'-'}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
}
